name: sports_config_app
description: Sports.com
publish_to: "none"

version: 1.1.0+9

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations: # <-- Adăugat
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  dio: ^5.7.0
  shared_preferences: ^2.3.2
  flutter_svg: ^2.2.3
  http: ^1.2.2
  crypto: ^3.0.3
  flutter_html: ^3.0.0
  video_player: ^2.10.1
  chewie: ^1.13.0
  better_player_plus: ^1.0.8
  webview_flutter: ^4.9.0
  package_info_plus: ^8.0.0
  upgrader: ^12.3.0
  intl: ^0.20.2
  url_launcher: ^6.3.0
  auto_size_text: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0


flutter:
  uses-material-design: true
  generate: true

  fonts:
    - family: Bebas Neue
      fonts:
        - asset: assets/fonts/BebasNeue-Regular.ttf
          weight: 400
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
  assets:
    - assets/fonts/
    - assets/images/
    - assets/images/flags/
